<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI 改进预览 - Bilibili 音频下载器</title>
    <link rel="stylesheet" href="/static/preview-style.css">
</head>
<body>
    <div class="preview-badge">预览效果</div>

    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🎵</span>
                <h1>Bilibili 音频下载器</h1>
            </div>
            <p class="subtitle">从视频中提取音频，保存为 MP3</p>
        </header>

        <main class="main-layout">
            <!-- 左侧：下载 + 播放器 -->
            <div class="left-column">
                <div class="download-section">
                    <form id="downloadForm">
                        <div class="input-wrapper">
                            <input
                                type="text"
                                id="urlInput"
                                name="url"
                                placeholder="请输入 Bilibili 视频链接或搜索关键词..."
                                required
                            >
                            <button type="submit" id="downloadBtn">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                <span class="btn-text">开始下载</span>
                            </button>
                        </div>
                    </form>

                    <!-- 进度条 -->
                    <div class="progress-container" id="progressContainer" style="display: none;">
                        <div class="progress-header">
                            <div class="progress-status">
                                <div class="status-dot"></div>
                                <span id="progressText">下载中...</span>
                            </div>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                            <div class="progress-glow"></div>
                        </div>
                    </div>

                    <div class="result-container" id="resultContainer" style="display: none;">
                        <div class="success-icon">✓</div>
                        <div class="success-content">
                            <span id="successText">下载完成!</span>
                            <a id="downloadLink" href="#" download>点击下载</a>
                        </div>
                    </div>

                    <div class="error-container" id="errorContainer" style="display: none;">
                        <span class="error-icon">✕</span>
                        <span id="errorText">下载失败</span>
                    </div>
                </div>

                <div class="player-section" id="playerSection">
                    <div class="player-vinyl" id="playerVinyl">
                        <div class="vinyl-record">
                            <img src="https://picsum.photos/200" alt="封面" onerror="this.parentElement.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">
                        </div>
                        <div class="vinyl-center"></div>
                    </div>

                    <div class="player-info">
                        <div class="player-title" id="playerTitle">未选择音乐</div>
                        <div class="player-artist">Bilibili Audio</div>
                    </div>

                    <div class="player-progress">
                        <span id="currentTime">0:00</span>
                        <div class="progress-track">
                            <div class="progress-played" id="progressPlayed"></div>
                            <input type="range" id="progressBar" class="progress-slider" value="0" min="0" max="100">
                            <div class="progress-handle"></div>
                        </div>
                        <span id="totalTime">0:00</span>
                    </div>

                    <div class="player-controls">
                        <button class="player-btn" id="prevBtn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button class="player-btn play-btn" id="playBtn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <button class="player-btn" id="nextBtn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                    </div>

                    <div class="player-volume">
                        <svg class="volume-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                        </svg>
                        <div class="volume-track">
                            <div class="volume-level" style="width: 80%"></div>
                            <input type="range" id="volumeBar" class="volume-slider" value="80" min="0" max="100">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：歌单 + 文件列表 -->
            <div class="right-column">
                <div class="playlist-section" id="playlistSection">
                    <div class="section-header">
                        <h2>
                            <svg class="section-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/>
                            </svg>
                            我的歌单
                        </h2>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="playlist-content">
                        <div class="playlist-header">
                            <input type="text" id="newPlaylistName" placeholder="新歌单名称">
                            <button id="createPlaylistBtn">+</button>
                        </div>
                        <div class="playlist-list">
                            <div class="playlist-item">
                                <div class="playlist-cover">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                                </div>
                                <div class="playlist-info">
                                    <span class="playlist-name">收藏列表</span>
                                    <span class="playlist-count">12 首</span>
                                </div>
                                <span class="playlist-toggle">▶</span>
                            </div>
                            <div class="playlist-item">
                                <div class="playlist-cover" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                                </div>
                                <div class="playlist-info">
                                    <span class="playlist-name">学习BGM</span>
                                    <span class="playlist-count">8 首</span>
                                </div>
                                <span class="playlist-toggle">▶</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="files-section">
                    <div class="section-header">
                        <h2>
                            <svg class="section-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                            </svg>
                            已下载文件
                        </h2>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="files-content">
                        <div class="files-toolbar">
                            <label class="select-all">
                                <input type="checkbox" id="selectAll">
                                <span>全选</span>
                            </label>
                            <button class="add-playlist-btn">添加到歌单</button>
                        </div>
                        <div class="files-list">
                            <div class="file-item active">
                                <input type="checkbox" class="file-checkbox">
                                <div class="file-cover">
                                    <img src="https://picsum.photos/100" alt="封面">
                                </div>
                                <div class="file-info">
                                    <div class="file-details">
                                        <div class="file-name">【CS】整活单曲《兄弟我内急》</div>
                                        <div class="file-size">3.2 MB · 5月12日</div>
                                    </div>
                                </div>
                                <div class="file-actions">
                                    <a href="#" class="play-action">▶</a>
                                    <a href="#" download>↓</a>
                                    <button>✕</button>
                                </div>
                            </div>
                            <div class="file-item">
                                <input type="checkbox" class="file-checkbox">
                                <div class="file-cover">
                                    <img src="https://picsum.photos/101" alt="封面">
                                </div>
                                <div class="file-info">
                                    <div class="file-details">
                                        <div class="file-name">徐良《坏女孩》，但是英文填词</div>
                                        <div class="file-size">4.1 MB · 5月10日</div>
                                    </div>
                                </div>
                                <div class="file-actions">
                                    <a href="#" class="play-action">▶</a>
                                    <a href="#" download>↓</a>
                                    <button>✕</button>
                                </div>
                            </div>
                            <div class="file-item">
                                <input type="checkbox" class="file-checkbox">
                                <div class="file-cover">
                                    <span class="file-icon">🎵</span>
                                </div>
                                <div class="file-info">
                                    <div class="file-details">
                                        <div class="file-name">哀人(i)</div>
                                        <div class="file-size">2.8 MB · 5月8日</div>
                                    </div>
                                </div>
                                <div class="file-actions">
                                    <a href="#" class="play-action">▶</a>
                                    <a href="#" download>↓</a>
                                    <button>✕</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>使用 <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a> 驱动 · 当前版本 v1.0.0</p>
        </footer>
    </div>
</body>
</html>
